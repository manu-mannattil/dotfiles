[Start]
checkFreq=0
inZoomFilter=1
OpenWith=/usr/bin/gimp, /usr/bin/inkscape, /usr/bin/darktable
OpenWithName=Gimp, Inkscape, Darktable
outZoomFilter=5
sessionFlag=2
startInFull=0
style=-2
updater=0

[Browser]
custom1Ext=htm, html, mht, mhtml, xml, xhtml, eml, nws, url, svg, svgz, ai, eps, epsf, pdf, ps, m1s, m1v, m2ts, m2v, m4v, mp4, mpa, mpe, mpeg, mpg, mpm, mts, 3g2, 3gp, 3gp2, mov, qt, asf, avi, divx, vfw, vob, wmv, aae, flv, mkv, mxf, rm, ts, webm, aif, asx, au, flac, m4a, mid, mp+, mp2, mp3, mpc, mpp, ogg, rmi, snd, wav, wma, txt
customFilter=1409
thumbnailFilter=1153

[%General]
showAgain=65536
useAnonymousLogs=false
useInternalVideoPlayer=false
useRecycleBin=false
version=@ByteArray(1.9.7)

[Viewer]
backColor=51 51 51
defaultFullscreenFit=2
fullBackColor=51 51 51
infoTemplate=
inZoomFilter=1
outZoomFilter=5
